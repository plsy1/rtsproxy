<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RTSProxy Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="title-group">
                <h1>RTSProxy Dashboard</h1>
            </div>
            <div class="status-badge" id="server-status">
                <span class="dot"></span> ONLINE
            </div>
        </header>

        <!-- STATUS ROW 1: Performance -->
        <div class="status-bar">
            <div class="stat-item">
                <span class="label">Bandwidth</span>
                <span class="value" id="bandwidth">0 Mbps</span>
            </div>
            <div class="stat-item">
                <span class="label">Traffic</span>
                <span class="value" id="total-traffic">0 B</span>
            </div>
            <div class="stat-item">
                <span class="label">Clients</span>
                <span class="value" id="active-clients">0</span>
            </div>
        </div>

        <!-- STATUS ROW 2: Memory -->
        <div class="status-bar">
            <div class="stat-item">
                <span class="label">Used Buffers</span>
                <span class="value" id="used-count">0</span>
            </div>
            <div class="stat-item">
                <span class="label">Total Buffers</span>
                <span class="value" id="total-buffers">0</span>
            </div>
            <div class="stat-item">
                <span class="label">Total RAM</span>
                <span class="value" id="total-memory">0 MB</span>
            </div>
        </div>

        <main class="main-content">
            <!-- LEFT: Active Sessions -->
            <section class="sessions-area">
                <div class="card-header">
                    <h2>Active Sessions</h2>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Downstream</th>
                                <th>Upstream</th>
                                <th>Type</th>
                                <th>Protocol</th>
                                <th>Duration</th>
                            </tr>
                        </thead>
                        <tbody id="sessions-body">
                            <!-- JS populated -->
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- RIGHT: Live Logs -->
            <section class="logs-area">
                <div class="card-header">
                    <h2>Live Logs</h2>
                    <div class="controls">
                        <select id="log-level-select">
                            <option value="0">DEBUG</option>
                            <option value="1" selected>INFO</option>
                            <option value="2">WARN</option>
                            <option value="3">ERROR</option>
                        </select>
                        <button id="clear-logs">Clear</button>
                    </div>
                </div>
                <div class="log-container" id="log-display">
                    <!-- Logs will appear here -->
                </div>
            </section>
        </main>
    </div>
    <script src="main.js"></script>
</body>
</html>
