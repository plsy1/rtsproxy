name: Build Check

on:
  push:
    branches: [ "**" ]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  native-build:
    name: Native Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build g++

      - name: Setup and Build
        run: |
          meson setup builddir
          meson compile -C builddir

  cross-build-check:
    name: Cross Build (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: arm64
            cpu_family: aarch64
            cpu: aarch64
            tool: aarch64-unknown-linux-musl
          - name: arm32hf
            tool: arm-unknown-linux-musleabihf
            cpu_family: arm
            cpu: arm32hf
          - name: arm32v7hf
            tool: armv7-unknown-linux-musleabihf
            cpu_family: arm
            cpu: arm32v7hf
          - name: i686
            tool: i686-unknown-linux-musl
            cpu_family: x86_64
            cpu: i686
          - name: mips32
            tool: mips-unknown-linux-musl
            cpu_family: mips
            cpu: mips
          - name: mips32sf
            tool: mips-unknown-linux-muslsf
            cpu_family: mips
            cpu: mips32sf
          - name: mipsel
            tool: mipsel-unknown-linux-musl
            cpu_family: mips
            cpu: mips32el
          - name: mipsel-sf
            tool: mipsel-unknown-linux-muslsf
            cpu_family: mips
            cpu: mips32elsf
          - name: riscv64
            tool: riscv64-unknown-linux-musl
            cpu_family: riscv64
            cpu: riscv64
          - name: x86_64
            cpu_family: x86_64
            cpu: x86_64
            tool: x86_64-unknown-linux-musl
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build

      - name: Download toolchain
        run: |
          sudo mkdir -p /opt/x-tools
          wget https://github.com/cross-tools/musl-cross/releases/download/20250929/${{ matrix.tool }}.tar.xz
          sudo tar xf ${{ matrix.tool }}.tar.xz -C /opt/x-tools

      - name: Set up crossfile
        run: |
          # Determine endianness (MIPS/PPC are usually big, others little)
          ENDIAN="little"
          if [[ "${{ matrix.name }}" == mips* ]] && [[ "${{ matrix.name }}" != *el* ]]; then
            ENDIAN="big"
          fi

          echo '[host_machine]' > crossfile.ini
          echo "system = 'linux'" >> crossfile.ini
          echo "cpu_family = '${{ matrix.cpu_family }}'" >> crossfile.ini
          echo "cpu = '${{ matrix.cpu }}'" >> crossfile.ini
          echo "endian = '$ENDIAN'" >> crossfile.ini
          echo '' >> crossfile.ini
          echo '[binaries]' >> crossfile.ini
          echo "cpp = '/opt/x-tools/${{ matrix.tool }}/bin/${{ matrix.tool }}-g++'" >> crossfile.ini
          echo "ar = '/opt/x-tools/${{ matrix.tool }}/bin/${{ matrix.tool }}-ar'" >> crossfile.ini
          echo "strip = '/opt/x-tools/${{ matrix.tool }}/bin/${{ matrix.tool }}-strip'" >> crossfile.ini

      - name: Build
        run: |
          meson setup builddir --cross-file=crossfile.ini --buildtype=release -Disstatic=true
          meson compile -C builddir -j$(nproc)

  openwrt-ipk-check:
    name: OpenWrt IPK Check (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            sdk_url: https://downloads.openwrt.org/releases/23.05.5/targets/x86/64/openwrt-sdk-23.05.5-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz
          - arch: mipsel_24kc
            sdk_url: https://downloads.openwrt.org/releases/23.05.5/targets/ramips/mt7621/openwrt-sdk-23.05.5-ramips-mt7621_gcc-12.3.0_musl.Linux-x86_64.tar.xz
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev gawk git gettext libssl-dev xsltproc wget unzip zstd python3-pyelftools

      - name: Cache SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: sdk
          key: sdk-23.05-${{ matrix.arch }}-${{ hashFiles('openwrt/rtsproxy/Makefile') }}

      - name: Download SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          mkdir -p sdk
          wget ${{ matrix.sdk_url }} -O sdk.tar.xz
          tar xf sdk.tar.xz -C sdk --strip-components=1

      - name: Build IPK
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
          # Remove any existing rtsproxy package from feeds to avoid version conflict
          rm -rf package/feeds/*/rtsproxy
          rm -rf package/rtsproxy
          
          mkdir -p package/rtsproxy
          cp -r ../openwrt/rtsproxy/* package/rtsproxy/
          cp -r ../src package/rtsproxy/
          cp -r ../include package/rtsproxy/
          cp -r ../webui package/rtsproxy/
          cp ../meson.build package/rtsproxy/
          cp ../meson_options.txt package/rtsproxy/
          
          make defconfig
          make package/rtsproxy/compile V=s

