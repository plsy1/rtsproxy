name: Build OpenWrt Packages

on:
  release:
    types:
      - published
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build for ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: 23.05-x64
            sdk_url: https://downloads.openwrt.org/releases/23.05.5/targets/x86/64/openwrt-sdk-23.05.5-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz
          - arch: 23.05-aarch64
            sdk_url: https://downloads.openwrt.org/releases/23.05.5/targets/rockchip/armv8/openwrt-sdk-23.05.5-rockchip-armv8_gcc-12.3.0_musl.Linux-x86_64.tar.xz
          - arch: 24.10-x64
            sdk_url: https://downloads.openwrt.org/releases/24.10.4/targets/x86/64/openwrt-sdk-24.10.4-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst
          - arch: 24.10-aarch64
            sdk_url: https://downloads.openwrt.org/releases/24.10.4/targets/rockchip/armv8/openwrt-sdk-24.10.4-rockchip-armv8_gcc-13.3.0_musl.Linux-x86_64.tar.zst

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build build-essential libncurses5-dev gawk git gettext libssl-dev xsltproc wget unzip qemu-utils zstd python3-pyelftools

      - name: Cache SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: sdk
          key: sdk-${{ matrix.arch }}-${{ hashFiles('**/Makefile') }}

      - name: Download and setup SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          mkdir sdk
          wget -q ${{ matrix.sdk_url }}
          tar xf openwrt-sdk-*.tar.* -C sdk --strip-components=1
          rm openwrt-sdk-*.tar.*
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Build Packages
        run: |
          cd sdk
          rm -rf package/rtsproxy package/luci-app-rtsproxy
          
          # 准备本体
          mkdir -p package/rtsproxy
          cp $GITHUB_WORKSPACE/openwrt/rtsproxy/Makefile package/rtsproxy/
          cp -r $GITHUB_WORKSPACE/openwrt/rtsproxy/files package/rtsproxy/
          cp -r $GITHUB_WORKSPACE/src package/rtsproxy/
          cp -r $GITHUB_WORKSPACE/include package/rtsproxy/
          cp $GITHUB_WORKSPACE/meson.build package/rtsproxy/
          cp $GITHUB_WORKSPACE/meson_options.txt package/rtsproxy/
          
          # 准备 LuCI
          mkdir -p package/luci-app-rtsproxy
          cp $GITHUB_WORKSPACE/openwrt/luci-app-rtsproxy/Makefile package/luci-app-rtsproxy/
          cp -r $GITHUB_WORKSPACE/openwrt/luci-app-rtsproxy/root package/luci-app-rtsproxy/
          cp -r $GITHUB_WORKSPACE/openwrt/luci-app-rtsproxy/htdocs package/luci-app-rtsproxy/ 2>/dev/null || true

          # 修复换行符
          find package/rtsproxy package/luci-app-rtsproxy -type f -exec sed -i 's/\r$//' {} +

          # 同步版本号和修订号
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG_NAME="${{ github.event.release.tag_name }}"
          else
            TAG_NAME="${{ github.ref_name }}"
          fi
          
          # 移除 v 前缀
          VERSION_FULL="${TAG_NAME#v}"
          # 提取主版本号 (移除 -rX)
          VERSION="${VERSION_FULL%-r*}"
          # 提取修订号
          REVISION_NUM="${VERSION_FULL##*-r}"
          if [ "$REVISION_NUM" = "$VERSION_FULL" ]; then
            REVISION="1"
          else
            REVISION=$((REVISION_NUM + 1))
          fi

          sed -i "s/^PKG_VERSION:=.*/PKG_VERSION:=$VERSION/" package/rtsproxy/Makefile
          sed -i "s/^PKG_RELEASE:=.*/PKG_RELEASE:=$REVISION/" package/rtsproxy/Makefile
          sed -i "s/^PKG_VERSION:=.*/PKG_VERSION:=$VERSION/" package/luci-app-rtsproxy/Makefile
          sed -i "s/^PKG_RELEASE:=.*/PKG_RELEASE:=$REVISION/" package/luci-app-rtsproxy/Makefile

          # 配置并编译
          echo "CONFIG_PACKAGE_rtsproxy=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-rtsproxy=y" >> .config
          make defconfig

          make package/rtsproxy/compile V=s
          make package/luci-app-rtsproxy/compile V=s

      - name: Collect artifacts
        run: |
          VERSION=$(grep "^PKG_VERSION:=" sdk/package/rtsproxy/Makefile | cut -d= -f2)
          REVISION=$(grep "^PKG_RELEASE:=" sdk/package/rtsproxy/Makefile | cut -d= -f2)
          mkdir -p output
          # 收集本体 (排除调试包)
          for file in $(find sdk/bin/packages/ -name "rtsproxy*.ipk" ! -name "luci-app-rtsproxy*" ! -name "*-dbgsym*"); do
            cp "$file" "output/rtsproxy_${VERSION}-r${REVISION}_openwrt-${{ matrix.arch }}.ipk"
          done
          # 收集 LuCI (排除调试包)
          for file in $(find sdk/bin/packages/ -name "luci-app-rtsproxy*.ipk" ! -name "*-dbgsym*"); do
            cp "$file" "output/luci-app-rtsproxy_${VERSION}-r${REVISION}_all.ipk"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rtsproxy-ipk-${{ matrix.arch }}
          path: output/*.ipk

  release:
    name: Release IPKs
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_ipk
          pattern: "rtsproxy-ipk-*"
          merge-multiple: true
      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG_NAME="${{ github.event.release.tag_name }}"
          else
            TAG_NAME="${{ github.ref_name }}"
          fi
          
          # 移除 v 前缀
          VERSION_FULL="${TAG_NAME#v}"
          VERSION="${VERSION_FULL%-r*}"
          
          # 尝试获取目标 tag (如果 v0.2.3-r2 触发，优先传到 v0.2.3 的 Release)
          TARGET_TAG="$VERSION"
          if [[ "$TAG_NAME" == v* ]]; then TARGET_TAG="v$VERSION"; fi
          
          # 如果目标 Tag 的 Release 不存在，则使用当前 Tag
          if ! gh release view "$TARGET_TAG" >/dev/null 2>&1; then
            TARGET_TAG="$TAG_NAME"
          fi

          echo "Target Release: $TARGET_TAG"

          # 清理旧版本的同名资产 (例如上传 r2 时删除 r1)
          EXISTING_ASSETS=$(gh release view "$TARGET_TAG" --json assets --jq '.assets[].name' 2>/dev/null || echo "")
          for asset in $EXISTING_ASSETS; do
            if [[ $asset =~ ^rtsproxy_${VERSION}-r[0-9]+_ ]] || [[ $asset =~ ^luci-app-rtsproxy_${VERSION}-r[0-9]+_ ]]; then
              # 如果文件名不完全一致（即修订号不同），则删除
              # 这里我们简单点，只要匹配该版本号的旧 rX 文件就删掉，保持 Release 干净
              echo "Cleaning up old revision asset: $asset"
              gh release delete-asset "$TARGET_TAG" "$asset" -y || true
            fi
          done

          # 上传新资产
          gh release upload "$TARGET_TAG" release_ipk/*.ipk --clobber
