name: Build OpenWrt Packages

on:
  release:
    types:
      - published
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build for ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: 23.05-x86_64
            sdk_url: https://downloads.openwrt.org/releases/23.05.5/targets/x86/64/openwrt-sdk-23.05.5-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz
          - arch: 23.05-aarch64
            sdk_url: https://downloads.openwrt.org/releases/23.05.5/targets/rockchip/armv8/openwrt-sdk-23.05.5-rockchip-armv8_gcc-12.3.0_musl.Linux-x86_64.tar.xz
          - arch: 24.10-x86_64
            sdk_url: https://downloads.openwrt.org/releases/24.10.0/targets/x86/64/openwrt-sdk-24.10.0-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst
          - arch: 24.10-aarch64
            sdk_url: https://downloads.openwrt.org/releases/24.10.0/targets/rockchip/armv8/openwrt-sdk-24.10.0-rockchip-armv8_gcc-13.3.0_musl.Linux-x86_64.tar.zst

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build build-essential libncurses5-dev gawk git gettext libssl-dev xsltproc wget unzip qemu-utils zstd python3-pyelftools

      - name: Cache SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: sdk
          key: sdk-${{ matrix.arch }}-${{ hashFiles('**/Makefile') }}

      - name: Download and setup SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          mkdir sdk
          wget -q ${{ matrix.sdk_url }}
          tar xf openwrt-sdk-*.tar.* -C sdk --strip-components=1
          rm openwrt-sdk-*.tar.*
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Build Packages
        run: |
          cd sdk
          # Fix paths for the Makefile (which expects to be in package/rtsproxy)
          mkdir -p package/rtsproxy
          cp $GITHUB_WORKSPACE/openwrt/rtsproxy/Makefile package/rtsproxy/
          cp -r $GITHUB_WORKSPACE/openwrt/rtsproxy/files package/rtsproxy/
          cp -r $GITHUB_WORKSPACE/src package/rtsproxy/
          cp -r $GITHUB_WORKSPACE/include package/rtsproxy/
          cp $GITHUB_WORKSPACE/meson.build package/rtsproxy/
          cp $GITHUB_WORKSPACE/meson_options.txt package/rtsproxy/
          
          # Same for LuCI app
          mkdir -p package/luci-app-rtsproxy
          cp $GITHUB_WORKSPACE/openwrt/luci-app-rtsproxy/Makefile package/luci-app-rtsproxy/
          cp -r $GITHUB_WORKSPACE/openwrt/luci-app-rtsproxy/root package/luci-app-rtsproxy/ 2>/dev/null || true
          cp -r $GITHUB_WORKSPACE/openwrt/luci-app-rtsproxy/htdocs package/luci-app-rtsproxy/ 2>/dev/null || true

          # Force fix CRLF to LF just like build_openwrt.sh
          find package/rtsproxy package/luci-app-rtsproxy -type f -exec sed -i 's/\r$//' {} +

          # Sync version with GitHub Release tag
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}" # Remove 'v' prefix (e.g., v0.1.13 -> 0.1.13)
            sed -i "s/^PKG_VERSION:=.*/PKG_VERSION:=$VERSION/" package/rtsproxy/Makefile
            sed -i "s/^PKG_VERSION:=.*/PKG_VERSION:=$VERSION/" package/luci-app-rtsproxy/Makefile
          fi

          # Configure the packages
          make defconfig
          sed -i 's/CONFIG_PACKAGE_rtsproxy=m/CONFIG_PACKAGE_rtsproxy=y/' .config
          sed -i 's/CONFIG_PACKAGE_luci-app-rtsproxy=m/CONFIG_PACKAGE_luci-app-rtsproxy=y/' .config

          # Compile
          make package/rtsproxy/compile V=s
          make package/luci-app-rtsproxy/compile V=s

      - name: Collect artifacts
        run: |
          mkdir -p output
          for file in $(find sdk/bin/packages/ -name "rtsproxy*.ipk" ! -name "luci-app-rtsproxy*"); do
            filename=$(basename "$file")
            # Extract prefix (e.g., rtsproxy_1.0.0-r1)
            prefix="${filename%_*}"
            # Append matrix arch (e.g., rtsproxy_1.0.0-r1_openwrt-24.10-x86_64.ipk)
            new_filename="${prefix}_openwrt-${{ matrix.arch }}.ipk"
            cp "$file" "output/$new_filename"
          done
          # Copy LuCI plugin as-is, since it's identical across all builds
          find sdk/bin/packages/ -name "luci-app-rtsproxy*.ipk" -exec cp {} output/ \;

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rtsproxy-ipk-${{ matrix.arch }}
          path: output/*.ipk

  release:
    name: Release IPKs
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_ipk
          pattern: "rtsproxy-ipk-*"
          merge-multiple: true
      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for i in release_ipk/*.ipk; do
            [ -f "$i" ] || continue
            gh release upload ${{ github.event.release.tag_name }} "$i"
          done
