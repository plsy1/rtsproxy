name: Build LuCI App

on:
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  build:
    name: Build using build_openwrt.sh
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gawk xsltproc build-essential libncurses-dev zlib1g-dev rsync git unzip zstd

      - name: Run build script
        run: bash build_openwrt.sh

      - name: Collect artifacts
        run: |
          mkdir -p output
          cp bin/openwrt/luci-app-rtsproxy*.ipk output/ 2>/dev/null || true
          
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-rtsproxy-ipk
          path: output/*.ipk

  release:
    name: Release LuCI IPK
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: luci-app-rtsproxy-ipk
          path: release_ipk
      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} release_ipk/*.ipk
